name: New ArchivesSpace release PR

on:
  repository_dispatch:
    types: [new-archivesspace-release]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag for manual testing'
        required: false
        type: string
      html_url:
        description: 'Release URL for manual testing'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: new-archivesspace-release-pr
  cancel-in-progress: false

jobs:
  update-latest-release-reference:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve release payload
        id: release
        shell: bash
        run: |
          TAG_NAME="${{ github.event.client_payload.tag_name }}"
          HTML_URL="${{ github.event.client_payload.html_url }}"

          # Allow manual runs via workflow_dispatch inputs.
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="${{ inputs.tag_name }}"
          fi
          if [ -z "$HTML_URL" ]; then
            HTML_URL="${{ inputs.html_url }}"
          fi

          if [ -z "$TAG_NAME" ]; then
            echo "::error::Missing tag_name (client_payload.tag_name or workflow input tag_name)."
            exit 1
          fi
          if [ -z "$HTML_URL" ]; then
            echo "::error::Missing html_url (client_payload.html_url or workflow input html_url)."
            exit 1
          fi

          # Branch-safe suffix from tag.
          BRANCH_SUFFIX="$(echo "$TAG_NAME" | tr -cs '[:alnum:]._-'' ' '-' | sed 's/^-*//; s/-*$//')"

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "html_url=$HTML_URL" >> "$GITHUB_OUTPUT"
          echo "branch_suffix=$BRANCH_SUFFIX" >> "$GITHUB_OUTPUT"

      - name: Write committed release data file
        shell: bash
        run: |
          cat > src/lib/latestArchivesSpaceRelease.ts <<'EOF'
          /**
           * Generated by .github/workflows/new-archivesspace-release.yml
           */
          export const LATEST_AS_RELEASE = {
            tagName: '${{ steps.release.outputs.tag_name }}',
            htmlUrl: '${{ steps.release.outputs.html_url }}',
          } as const
          EOF

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            Update latest ArchivesSpace version to ${{ steps.release.outputs.tag_name }}

            Release URL: ${{ steps.release.outputs.html_url }}
          title: 'Update latest ArchivesSpace version to ${{ steps.release.outputs.tag_name }}'
          body: |
            This PR was generated automatically from a new release event from the ArchivesSpace core repository.

            - **Tag:** `${{ steps.release.outputs.tag_name }}`
            - **Release URL:** ${{ steps.release.outputs.html_url }}
          branch: 'bot/new-release-${{ steps.release.outputs.branch_suffix }}'
          delete-branch: true
          labels: |
            automation
            core-release

      - name: PR result
        if: steps.cpr.outputs.pull-request-number != ''
        run: |
          echo "Created/updated PR #${{ steps.cpr.outputs.pull-request-number }}"
          echo "PR URL: ${{ steps.cpr.outputs.pull-request-url }}"
